name: Build Windows App

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - run: flutter config --enable-windows-desktop

      - run: flutter pub get

      - run: flutter doctor -v

      - run: flutter build windows --release

      - name: List build output
        run: |
          echo "=== build/windows/ contents ==="
          Get-ChildItem -Recurse build/windows | Select-Object FullName, Length
          echo "=== Looking for .exe ==="
          Get-ChildItem -Recurse -Filter *.exe build/windows | Select-Object FullName, Length
        shell: pwsh

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: windows-build
          path: |
            build/windows/runner/Release/*.exe
            build/windows/runner/Release/*.dll
            build/windows/runner/Release/data/**
