name: Build Windows App

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - run: flutter config --enable-windows-desktop

      - run: flutter pub get

      - run: flutter build windows --release

      - name: Install WiX
        run: dotnet tool install --global wix --version 5.0.2

      - name: Build MSI
        run: |
          $env:Path += ";$env:USERPROFILE\.dotnet\tools"
          wix harvest folder -d build/windows/x64/runner/Release -g AppFiles -o files.wxs
          wix build windows/installer.wxs files.wxs -arch x64 -out yum-inventory.msi

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: windows-msi
          path: '*.msi'
