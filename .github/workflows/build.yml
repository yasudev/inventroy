name: Build Windows App

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - run: flutter config --enable-windows-desktop

      - run: flutter pub get

      - run: flutter build windows --release

      - name: Install WiX
        run: dotnet tool install --global wix --version 5.0.2

      - name: Build MSI
        shell: pwsh
        run: |
          $env:Path += ";$env:USERPROFILE\.dotnet\tools"
          $src = "build/windows/x64/runner/Release"
          "<?xml version='1.0' encoding='utf-8'?>" | Out-File files.wxs -Encoding utf8
          "<Wix xmlns='http://wixtoolset.org/schemas/v4/wxs'>" | Out-File files.wxs -Encoding utf8 -Append
          "<Fragment>" | Out-File files.wxs -Encoding utf8 -Append
          "<ComponentGroup Id='AppFiles' Directory='INSTALLFOLDER'>" | Out-File files.wxs -Encoding utf8 -Append
          Get-ChildItem -Recurse $src | ForEach-Object {
            $rel = $_.FullName.Substring((Get-Item $src).FullName.Length + 1)
            if (-not $_.PSIsContainer) {
              $id = "f" + $rel -replace '[\W]', '_'
              "<Component Id='$id' Guid='*'>" | Out-File files.wxs -Encoding utf8 -Append
              "<File Id='$id' Source='$src\$rel' KeyPath='yes' />" | Out-File files.wxs -Encoding utf8 -Append
              "</Component>" | Out-File files.wxs -Encoding utf8 -Append
            }
          }
          "</ComponentGroup>" | Out-File files.wxs -Encoding utf8 -Append
          "</Fragment>" | Out-File files.wxs -Encoding utf8 -Append
          "</Wix>" | Out-File files.wxs -Encoding utf8 -Append
          wix build windows/installer.wxs files.wxs -arch x64 -out yum-inventory.msi

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: windows-msi
          path: '*.msi'
